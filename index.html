<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopee Ads Manager</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🛒</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <!-- Thư viện ngoài (UMD) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

  <!-- ===== MÀN HÌNH ĐĂNG NHẬP ===== -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <div class="auth-logo"><span class="logo-badge">S</span><h1>Shopee Ads Manager</h1></div>
      <p class="auth-sub">Đăng nhập để đồng bộ dữ liệu với Supabase</p>
      <form id="auth-form">
        <label class="field"><span>Email</span>
          <input type="email" id="auth-email" required placeholder="you@email.com" autocomplete="email" /></label>
        <label class="field"><span>Mật khẩu</span>
          <input type="password" id="auth-password" required minlength="6" placeholder="••••••••" autocomplete="current-password" /></label>
        <div id="auth-error" class="auth-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-block" id="auth-submit">Đăng nhập</button>
        <button type="button" class="btn btn-ghost btn-block" id="auth-toggle">Chưa có tài khoản? Đăng ký</button>
      </form>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app" class="app hidden">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo-badge">S</span>
        <span class="sidebar-title">Ads Manager</span>
        <button class="icon-btn sidebar-close" id="sidebar-close" aria-label="Đóng menu">✕</button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <a href="#/dashboard"  class="nav-item" data-route="dashboard"><span class="nav-ico">📊</span>Dashboard</a>
        <a href="#/upload"     class="nav-item" data-route="upload"><span class="nav-ico">⬆️</span>Upload Data</a>
        <a href="#/campaigns"  class="nav-item" data-route="campaigns"><span class="nav-ico">📣</span>Campaign Analysis</a>
        <a href="#/keywords"   class="nav-item" data-route="keywords"><span class="nav-ico">🔑</span>Keyword Analysis</a>
        <a href="#/products"   class="nav-item" data-route="products"><span class="nav-ico">🛋️</span>Product Analysis</a>
        <a href="#/roas"       class="nav-item" data-route="roas"><span class="nav-ico">💹</span>ROAS Analysis</a>
        <a href="#/insights"   class="nav-item" data-route="insights"><span class="nav-ico">🤖</span>AI Insight</a>
        <a href="#/planner"    class="nav-item" data-route="planner"><span class="nav-ico">🗓️</span>Ads Planner</a>
        <a href="#/kpi"        class="nav-item" data-route="kpi"><span class="nav-ico">👥</span>Employee KPI</a>
        <a href="#/reports"    class="nav-item" data-route="reports"><span class="nav-ico">📄</span>Reports</a>
        <a href="#/settings"   class="nav-item" data-route="settings"><span class="nav-ico">⚙️</span>Settings</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip"><span id="user-email">—</span></div>
        <button class="btn btn-ghost btn-block" id="btn-logout">Đăng xuất</button>
      </div>
    </aside>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <button class="icon-btn" id="btn-menu" aria-label="Menu">☰</button>
        <h2 class="page-title" id="page-title">Dashboard</h2>
        <div class="topbar-actions">
          <span class="sync-dot" id="sync-dot" title="Realtime Supabase"></span>
          <button class="icon-btn" id="btn-theme" title="Dark / Light">🌙</button>
        </div>
      </header>
      <main class="content" id="page-content">
        <div class="loading-wrap"><div class="spinner"></div><p>Đang tải dữ liệu…</p></div>
      </main>
    </div>
  </div>

  <!-- Toast + Modal root -->
  <div id="toast-root" class="toast-root"></div>
  <div id="modal-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
